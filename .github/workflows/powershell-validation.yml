name: PowerShell Validation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyze Scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse

          if ($results) {
              Write-Host "Analyzer Results:"
              $results | Format-Table -AutoSize
          }

          $errors = $results | Where-Object { $_.Severity -eq 'Error' }

          if ($errors) {
              throw "PSScriptAnalyzer detected one or more errors."
          }

      - name: Validation Complete
        shell: pwsh
        run: |
          Write-Host "PowerShell validation completed successfully."